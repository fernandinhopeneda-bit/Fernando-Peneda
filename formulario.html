<h1><Cadastro de Cliente></h1>

<form action="#" method="post">
    <label for="nome">Nome Completo:</label><br> 
    <input type="text" id="nome" name="nome_cliente"><br><br>

    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email_cliente"><br>

    <label for="senha">Senha:</label><br>
    <input type="password" id="senha"
    name="senha_cliente"><br><br>

    <label for="idade">Idade</label><br>
    <input type="number" id="idade"
    name="idade_cliente"><br><br>

    <label for="categoria">Categoria de Jogo Favorita:</label><br>
    <select id="categoria" name="categoria_jogo">
        <option value="acao">Ação</option>
        <option value="esporte">Esporte</option>
        <option value="aventura">Aventura</option> 
    </select>
    <br><br>

    <p>Tipo de Conta:</p>
    <input type="radio" id="basica" name="tipo_conta"
    value="basica">
    <label for="basica">Básica</label><br>

    <input type="radio" id="premium" name="tipo_conta"
    value="premium"
    <label for="premium">Premium</label><br><br>
    
    <p>Plataformas Utilizadas:</p> 

    <input type="checkbox" id="pc" name="plataformas[]"
    value="pc">
    <label for="pc">PC</label><br>

    <input type="checkbox" id="playstation" name="plataformas[]"
    value="playstation">
    <label for="playstation">PlayStation</label><br> 

    <input type="checkbox" id="xbox" name="plataformas[]"
    value="xbox">
    <label for="xbox">Xbox</label><br><br>

    <label for="observacoes">Observações:</label><br>
    <textarea id="observacoes" name="observacoes" rows="5"
    cols="40"></textarea>
    <br><br>

    <input type="submit" value="Enviar">

</form>
